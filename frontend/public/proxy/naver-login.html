<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Naver Login Proxy</title>
    <script>
        // Firebase Hosting에서 Functions 호출 (CORS 없음)
        async function proxyNaverLogin(data) {
            try {
                // Firebase Hosting에서는 /__/functions/ 경로로 직접 호출 가능
                const response = await fetch('/__/functions/naverLoginHTTP', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                return await response.json();
            } catch (error) {
                console.error('Proxy error:', error);
                throw error;
            }
        }

        // PostMessage를 통한 통신
        window.addEventListener('message', async (event) => {
            // cyberbrain.kr에서 온 요청만 처리
            if (event.origin !== 'https://cyberbrain.kr') {
                return;
            }

            try {
                const result = await proxyNaverLogin(event.data);
                // 결과를 다시 cyberbrain.kr로 전송 (팝업 방식)
                if (window.opener) {
                    window.opener.postMessage({
                        type: 'naver-login-result',
                        success: true,
                        data: result
                    }, event.origin);
                }
            } catch (error) {
                if (window.opener) {
                    window.opener.postMessage({
                        type: 'naver-login-result',
                        success: false,
                        error: error.message
                    }, event.origin);
                }
            }
        });

        // 준비 완료 신호 (팝업 방식)
        if (window.opener) {
            window.opener.postMessage({
                type: 'proxy-ready'
            }, 'https://cyberbrain.kr');
        }
    </script>
</head>
<body>
    <div style="text-align: center; padding: 20px; font-family: Arial, sans-serif;">
        <h3>Naver Login Proxy</h3>
        <p>Processing authentication...</p>
    </div>
</body>
</html>
