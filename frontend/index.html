<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <!-- 🔒 비공개 서비스 설정 (검색엔진 차단) -->
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
  <meta name="googlebot" content="noindex, nofollow">
  <meta name="bingbot" content="noindex, nofollow">
  
  <!-- 🔧 수정: X-Frame-Options meta 태그 제거 (HTTP 헤더에서만 설정 가능) -->
  <!-- <meta http-equiv="X-Frame-Options" content="DENY"> -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="Referrer-Policy" content="no-referrer">
  
  <!-- 전자두뇌비서관 파비콘 -->
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  
  <!-- PWA 지원 -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1e3a8a">
  <meta name="msapplication-TileColor" content="#1e3a8a">
  
  <!-- 🎨 풍부한 브랜딩 메타태그 (SEO 아님) -->
  <meta name="application-name" content="전자두뇌비서관">
  <meta name="apple-mobile-web-app-title" content="전자두뇌비서관">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="mobile-web-app-capable" content="yes">
  
  <!-- 📱 모바일 최적화 -->
  <meta name="format-detection" content="telephone=no">
  <meta name="msapplication-tap-highlight" content="no">
  
  <title>전자두뇌비서관</title>
  
  <!-- 🎨 인라인 스타일로 로딩 최적화 -->
  <style>
    /* 로딩 중 기본 스타일 */
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #f8fafc 0%, #e0f2fe 100%);
      color: #1f2937;
    }
    
    #root {
      min-height: 100vh;
    }
    
    /* 로딩 스피너 */
    .loading-container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
    }
    
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #e5e7eb;
      border-top: 4px solid #1e3a8a;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 1rem;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .loading-text {
      color: #1e3a8a;
      font-weight: 600;
      font-size: 1rem;
    }
    
    /* React 로드 후 숨김 */
    .loading-container.hidden {
      display: none;
    }
  </style>
</head>
<body>
  <!-- React 앱 마운트 지점 -->
  <div id="root">
    <!-- React 로딩 중 표시할 내용 -->
    <div class="loading-container" id="loading-container">
      <div class="loading-spinner"></div>
      <div class="loading-text">전자두뇌비서관 로딩 중...</div>
    </div>
  </div>
  
  <!-- React 앱 스크립트 -->
  <script type="module" src="/src/main.jsx"></script>
  
  <!-- 로딩 완료 후 스피너 숨김 -->
  <script>
    // React 로드 완료 감지
    window.addEventListener('DOMContentLoaded', () => {
      // React가 마운트되면 로딩 스피너 숨김
      setTimeout(() => {
        const loadingContainer = document.getElementById('loading-container');
        if (loadingContainer) {
          loadingContainer.classList.add('hidden');
        }
      }, 1000);
    });
  </script>
</body>
</html>
